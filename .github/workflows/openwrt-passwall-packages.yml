name: Sync upstream passwall-packages

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/xiaorouji/openwrt-passwall-packages.git || true
          git fetch upstream --tags

          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Sync upstream" || true

          git push origin main
          git push origin --tags
